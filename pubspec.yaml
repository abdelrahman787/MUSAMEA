name: musaami
description: "مُسَمِّع - تطبيق ذكي لتسميع ومراجعة حفظ القرآن الكريم"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Core
  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.5

  # Navigation
  go_router: ^14.0.0

  # Local Storage
  shared_preferences: ^2.5.3

  # HTTP Client
  http: ^1.5.0

  # SQLite
  sqflite: ^2.4.1
  path: ^1.9.0
  path_provider: ^2.1.5

  # Permissions
  permission_handler: ^11.4.0

  # UI Helpers
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Arabic Text
  google_fonts: ^6.2.1

  # Quran Data (complete 114 suras, 6236 verses)
  quran: ^1.3.3

  # Speech Recognition (real ASR)
  speech_to_text: ^7.0.0

  # Splash Screen
  flutter_native_splash: ^2.4.6

  # App Icon
  flutter_launcher_icons: ^0.14.3

  # Connectivity
  connectivity_plus: ^6.1.4

  # Logging
  logger: ^2.5.0

  # Animations
  lottie: ^3.3.1
  animated_text_kit: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/images/
    - assets/lottie/
    - assets/data/

  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
        - asset: assets/fonts/Amiri-Italic.ttf
          style: italic
    - family: Scheherazade
      fonts:
        - asset: assets/fonts/ScheherazadeNew-Regular.ttf
        - asset: assets/fonts/ScheherazadeNew-Bold.ttf
          weight: 700
